# Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Yank!"
CONFIG_BT_MAX_CONN=1
CONFIG_BT_MAX_PAIRED=3

# BLE connection parameters — relaxed for power savings.
# Slave latency of 4 lets the radio skip 4 idle events, but the peripheral
# can still transmit immediately when it has data (pull event).
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=24
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=40
CONFIG_BT_PERIPHERAL_PREF_LATENCY=4
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# TX buffers — keep enough so rapid pulls don't drop
CONFIG_BT_BUF_ACL_TX_COUNT=10
CONFIG_BT_L2CAP_TX_BUF_COUNT=10
CONFIG_BT_CONN_TX_MAX=10

# Battery service
CONFIG_BT_BAS=y

# GPIO
CONFIG_GPIO=y

# ADC
CONFIG_ADC=y

# Serial console — only in debug builds. Disable for production to save ~1-2mA.
# Uncomment the next 3 lines for debug output:
# CONFIG_SERIAL=y
# CONFIG_CONSOLE=y
# CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n

# Power management — System ON sleep between events.
# GPIO interrupts wake the CPU from sleep; no events are missed.
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# System
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_REBOOT=y

# GRTC (required for nRF54L15)
CONFIG_NRF_GRTC_START_SYSCOUNTER=y

# Regulator
CONFIG_REGULATOR=y
